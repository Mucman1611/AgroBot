<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAssistant - Moj dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🌾</span>
            <span>AgriAssistant</span>
        </div>
        <div class="nav-links">
            <span class="user-info">
                <span id="farmerName"></span>
                <span class="user-role role-farmer">Poljoprivrednik</span>
            </span>
            <a href="#" id="logoutBtn" class="btn btn-outline btn-sm">Odjava</a>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-number" id="myFarms">0</div>
                <div class="stat-label">Moja gospodarstva</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ff8f00, #e65100);">
                <div class="stat-number" id="myDeadlines">0</div>
                <div class="stat-label">Aktivnih rokova</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>📋 Moji OPG-ovi</span>
                <button class="btn btn-primary btn-sm" onclick="showAddFarmModal()">+ Dodaj OPG</button>
            </div>
            <div id="myFarmsList">
                <div class="loading" style="margin: 20px auto;"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>🎙️ Glasovno upravljanje</span>
            </div>
            <div style="text-align: center; padding: 20px;">
                <button id="voiceBtn" class="btn btn-primary" style="padding: 20px 40px; font-size: 1.2rem;">🎤 Prijavi sve parcele</button>
                <p id="voiceStatus" style="margin-top: 15px; color: #666;"></p>
            </div>
        </div>
    </div>

    <div id="addFarmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Dodaj OPG</h2>
                <button class="close-modal" onclick="closeAddFarmModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addFarmForm">
                    <div class="form-group">
                        <label>Naziv OPG-a</label>
                        <input type="text" id="farmName" required>
                    </div>
                    <div class="form-group">
                        <label>Lokacija</label>
                        <input type="text" id="farmLocation" required>
                    </div>
                    <div class="form-group">
                        <label>Površina (ha)</label>
                        <input type="number" id="farmArea" step="0.1" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Dodaj</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function checkAuth() {
            if (!localStorage.getItem('token')) window.location.href = 'index.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        async function loadFarmerData() {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_URL}/farmer/farms`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const farms = await response.json();
                document.getElementById('myFarms').textContent = farms.length;
                const totalDeadlines = farms.reduce((sum, f) => sum + (f.deadlines?.length || 0), 0);
                document.getElementById('myDeadlines').textContent = totalDeadlines;
                if (farms.length === 0) {
                    document.getElementById('myFarmsList').innerHTML = '<p style="text-align:center;padding:20px;color:#999;">Još nemate dodanih OPG-ova</p>';
                } else {
                    document.getElementById('myFarmsList').innerHTML = farms.map(f => `
                        <div class="farm-item">
                            <div>
                                <div class="farm-name">${escapeHtml(f.name)}</div>
                                <div style="font-size:0.85rem;color:#666;">${escapeHtml(f.location)} | ${f.total_area_ha} ha</div>
                            </div>
                            <div>
                                ${f.deadlines && f.deadlines.length > 0
                                    ? `<div class="farm-deadline">📅 ${f.deadlines.length} rokova</div>`
                                    : '<div style="font-size:0.75rem;color:#999;">nema rokova</div>'}
                            </div>
                        </div>
                    `).join('');
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');

        voiceBtn.onclick = async () => {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                voiceStatus.textContent = '❌ Vaš preglednik ne podržava glasovno upravljanje. Koristite Chrome.';
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'hr-HR';
            recognition.interimResults = false;
            voiceBtn.disabled = true;
            voiceStatus.textContent = '🎙️ Slušam...';
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                voiceStatus.textContent = `Čujem: "${transcript}"`;
                if (transcript.includes('prijavi') || transcript.includes('parcele') || transcript.includes('prijava')) {
                    voiceStatus.textContent = '⏳ Obrađujem naredbu...';
                    const token = localStorage.getItem('token');
                    const response = await fetch(`${API_URL}/voice/command`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    voiceStatus.textContent = data.message;
                    if (data.status === 'success') loadFarmerData();
                } else {
                    voiceStatus.textContent = '❓ Naredba nije prepoznata. Recite "Prijavi sve parcele".';
                }
            };
            recognition.onerror = () => {
                voiceStatus.textContent = '❌ Greška pri prepoznavanju govora.';
            };
            recognition.onend = () => {
                voiceBtn.disabled = false;
            };
            recognition.start();
        };

        function showAddFarmModal() { document.getElementById('addFarmModal').classList.add('active'); }
        function closeAddFarmModal() { document.getElementById('addFarmModal').classList.remove('active'); }

        document.getElementById('addFarmForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_URL}/farmer/farms/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    name: document.getElementById('farmName').value,
                    location: document.getElementById('farmLocation').value,
                    total_area_ha: parseFloat(document.getElementById('farmArea').value)
                })
            });
            if (response.ok) {
                closeAddFarmModal();
                document.getElementById('addFarmForm').reset();
                loadFarmerData();
            } else {
                alert('Greška pri dodavanju OPG-a');
            }
        };

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear();
            window.location.href = 'index.html';
        };

        checkAuth();
        document.getElementById('farmerName').textContent = localStorage.getItem('userName') || '';
        loadFarmerData();
    </script>
</body>
</html>
